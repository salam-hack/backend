name: Build & Deploy Node Backend

on:
  push:
    branches: [ "production" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      IMAGE_NAME: ghcr.io/salam-hack/node-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:latest

      - name: Deploy on server
        run: |
          cd ~/modaber/node-backend
          docker compose pull
          docker compose up -d --force-recreate
